<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
  <style>
    body{margin:0;background:#0F0F0F;}
    a{color:#E8E8E6;}
    a:hover{color:#AAAAAA;}
    @media (max-width: 640px) {
      .hero-grid { grid-template-columns: 1fr !important; padding: 40px 24px 48px 24px !important; gap: 32px !important; }
      .hero-grid .hero-photo { order: -1; }
      .hero-grid .hero-photo img { width: 200px !important; height: 250px !important; }
      .hero-title { font-size: 52px !important; }
      .hero-tag { font-size: 20px !important; }
      .info-strip { padding: 20px 24px !important; text-align: center; }
      .site-footer { padding: 24px !important; flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
    }
  </style>
</helmet>

<dc-import name="Nav" current="home" hint-size="100%,81px"></dc-import>

<div style="fontFamily:'DM Sans',sans-serif;background:#0F0F0F;">

  <section class="hero-grid" style="display:grid;gridTemplateColumns:1.2fr 0.8fr;gap:64px;padding:96px 48px 80px 48px;alignItems:center;maxWidth:1280px;margin:0 auto;boxSizing:border-box;">
    <div>
      <div style="fontFamily:'DM Sans',sans-serif;fontSize:13px;letterSpacing:1.5px;textTransform:uppercase;color:#CCCCCC;marginBottom:24px;">UX/UI Designer → Front End Developer</div>
      <h1 class="hero-title" style="fontFamily:'Instrument Serif',serif;fontWeight:400;fontSize:96px;lineHeight:1.05;color:#E8E8E6;margin:0 0 32px 0;">Dominic Arlequin</h1>
      <p class="hero-tag" style="fontFamily:'DM Sans',sans-serif;fontWeight:400;fontSize:28px;lineHeight:1.4;color:#CCCCCC;margin:0 0 48px 0;maxWidth:560px;">I design with intention, I build with purpose.</p>
      <div style="display:flex;gap:32px;alignItems:center;">
        <a href="Projects.dc.html" style="fontFamily:'DM Sans',sans-serif;fontSize:16px;fontWeight:500;color:#E8E8E6;textDecoration:none;borderBottom:1px solid #E8E8E6;paddingBottom:4px;">View the work →</a>
        <a href="Contact.dc.html" style="fontFamily:'DM Sans',sans-serif;fontSize:16px;color:#AAAAAA;textDecoration:none;borderBottom:1px solid transparent;paddingBottom:4px;">Get in touch</a>
      </div>
    </div>
    <div class="hero-photo" style="display:flex;justifyContent:center;">
      <img src="./portrait.webp" alt="Dominic Arlequin" style="width:320px;height:400px;object-fit:cover;border:1px solid #333333;background:#1A1A1A;filter:grayscale(1) contrast(1.05);" />
    </div>
  </section>

  <section class="info-strip" style="borderTop:1px solid #333333;borderBottom:1px solid #333333;background:#1A1A1A;padding:24px 48px;display:flex;justifyContent:center;">
    <div style="fontFamily:'DM Sans',sans-serif;fontSize:14px;color:#AAAAAA;letterSpacing:0.3px;">Currently, Pursuit AI Fundamentals Fellow, building front end & AI powered tools</div>
  </section>

  <footer class="site-footer" style="borderTop:1px solid #333333;padding:32px 48px;display:flex;justifyContent:space-between;alignItems:center;flexWrap:wrap;gap:16px;fontFamily:'DM Sans',sans-serif;fontSize:13px;color:#AAAAAA;">
    <span>© 2026 Dominic Arlequin</span>
    <div style="display:flex;gap:24px;">
      <a href="mailto:dominic.arlequin@pursuit.org" style="color:#AAAAAA;textDecoration:none;">Email</a>
      <a href="https://github.com/dominicarlequin-design" target="_blank" style="color:#AAAAAA;textDecoration:none;">GitHub</a>
      <a href="https://www.linkedin.com/in/dominic-arlequin-200407419/" target="_blank" style="color:#AAAAAA;textDecoration:none;">LinkedIn</a>
    </div>
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {};
  }
}
</script>
</body>
</html>
