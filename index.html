<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <script src="./image-slot.js"></script>
  <style>
    body{margin:0;background:#FFFFFF;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
    a{color:#1A1A18;}
    a:hover{color:#4A4A48;}
    @media (max-width: 1024px) {
      .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
      .hero-grid .hero-photo { order: -1; }
    }
    @media (max-width: 640px) {
      .hero-grid { padding: 40px 24px 48px 24px !important; gap: 32px !important; }
      .hero-grid .hero-photo img { width: 200px !important; height: 250px !important; }
      .hero-title { font-size: 52px !important; max-width: 300px !important; }
      .hero-tag { font-size: 20px !important; max-width: 300px !important; }
      .info-strip { padding: 20px 24px !important; text-align: center; }
      .site-footer { padding: 24px !important; flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
    }
  </style>
</helmet>

<dc-import name="Nav" current="home" hint-size="100%,81px"></dc-import>

<div style="fontFamily:'DM Sans',sans-serif;background:#FFFFFF;">

  <section class="hero-grid" style="display:grid;gridTemplateColumns:1.2fr 0.8fr;gap:64px;padding:96px 48px 80px 48px;alignItems:center;maxWidth:1280px;margin:0 auto;boxSizing:border-box;">
    <div style="width:100%;minWidth:0;boxSizing:border-box;">
      <div style="fontFamily:'DM Sans',sans-serif;fontSize:13px;letterSpacing:1.5px;textTransform:uppercase;color:#4A4A48;marginBottom:24px;">UX/UI Designer → Front End Developer</div>
      <h1 class="hero-title" style="fontFamily:'Instrument Serif',serif;fontWeight:400;fontSize:96px;lineHeight:1.05;color:#1A1A18;margin:0 0 32px 0;width:100%;maxWidth:100%;overflowWrap:break-word;wordBreak:break-word;">Dominic Arlequin</h1>
      <p class="hero-tag" style="fontFamily:'DM Sans',sans-serif;fontWeight:400;fontSize:28px;lineHeight:1.4;color:#4A4A48;margin:0 0 48px 0;width:100%;maxWidth:560px;overflowWrap:break-word;wordBreak:break-word;">I design with intention, I build with purpose.</p>
      <div style="display:flex;gap:32px;alignItems:center;">
        <a href="Projects.dc.html" style="fontFamily:'DM Sans',sans-serif;fontSize:16px;fontWeight:500;color:#1A1A18;textDecoration:none;borderBottom:1px solid #1A1A18;paddingBottom:4px;" style-hover="color:#FFC800;border-bottom-color:#FFC800;">View the work →</a>
        <a href="Contact.dc.html" style="fontFamily:'DM Sans',sans-serif;fontSize:16px;fontWeight:500;color:#1A1A18;textDecoration:none;borderBottom:1px solid #1A1A18;paddingBottom:4px;" style-hover="color:#FFC800;border-bottom-color:#FFC800;">Get in touch</a>
      </div>
    </div>
    <div class="hero-photo" style="display:flex;justifyContent:center;">
      <div style="position:relative;display:inline-block;">
        <img src="./portrait.webp" alt="Dominic Arlequin" style="width:320px;maxWidth:100%;height:400px;object-fit:cover;border:1px solid #1A1A18;background:#1A1A1A;filter:grayscale(1) contrast(1.05);" />
        <div style="position:absolute;top:-2px;left:-2px;width:24px;height:24px;borderTop:2px solid #FFC800;borderLeft:2px solid #FFC800;borderRadius:0;pointerEvents:none;"></div>
        <div style="position:absolute;top:-2px;right:-2px;width:24px;height:24px;borderTop:2px solid #FFC800;borderRight:2px solid #FFC800;borderRadius:0;pointerEvents:none;"></div>
        <div style="position:absolute;bottom:-2px;left:-2px;width:24px;height:24px;borderBottom:2px solid #FFC800;borderLeft:2px solid #FFC800;borderRadius:0;pointerEvents:none;"></div>
        <div style="position:absolute;bottom:-2px;right:-2px;width:24px;height:24px;borderBottom:2px solid #FFC800;borderRight:2px solid #FFC800;borderRadius:0;pointerEvents:none;"></div>
      </div>
    </div>
  </section>

  <section class="info-strip" style="borderTop:1px solid #1A1A18;borderBottom:1px solid #1A1A18;background:#F5F5F4;padding:24px 48px;display:flex;justifyContent:center;">
    <div style="fontFamily:'DM Sans',sans-serif;fontSize:14px;color:#4A4A48;letterSpacing:0.3px;">Currently, Pursuit AI Fundamentals Fellow, building front end & AI powered tools</div>
  </section>

  <footer class="site-footer" style="borderTop:1px solid #1A1A18;padding:32px 48px;display:flex;justifyContent:space-between;alignItems:center;flexWrap:wrap;gap:16px;fontFamily:'DM Sans',sans-serif;fontSize:13px;color:#4A4A48;">
    <span>© 2026 Dominic Arlequin</span>
    <div style="display:flex;gap:24px;">
      <a href="mailto:dominic.arlequin@pursuit.org" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">Email</a>
      <a href="https://github.com/dominicarlequin-design" target="_blank" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">GitHub</a>
      <a href="https://www.linkedin.com/in/dominic-arlequin-200407419/" target="_blank" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">LinkedIn</a>
    </div>
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {};
  }
}
</script>
</body>
</html>
