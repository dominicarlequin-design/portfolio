  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"989387b3-7baf-452e-8422-1c3c7c2ed54c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9f606347-07ba-4883-abc2-a30b61dd378d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"dfdafa80-7c5b-403b-ae78-b7a9d6f6c4c3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"04c4840c-c5a5-44d8-895a-3bb991c30081\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    body { margin: 0; background: #FAF7F2; }\n    a { color: #2F3E33; }\n    a:hover { color: #6B8068; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#FAF7F2; min-height:100vh; padding:48px 16px; box-sizing:border-box; font-family:'DM Sans', sans-serif; color:#2A2A28;\">\n  <div style=\"max-width:900px; margin:0 auto; border:2px solid #2F3E33; background:#FAF7F2;\">\n\n    <!-- HERO -->\n    <section style=\"padding:80px 32px; text-align:center;\">\n      <div style=\"width:64px; height:64px; border:1px solid #A9B8A4; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 32px auto;\">\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:14px; letter-spacing:0.08em; color:#2F3E33;\">{{ initials }}<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Instrument Serif', serif; font-style:italic; font-weight:400; font-size:56px; margin:0 0 16px 0; color:#2F3E33; line-height:1.1;\" data-comment-anchor=\"hero-name\">{{ name }}<\u002Fh1>\n      <p style=\"font-family:'DM Sans', sans-serif; font-size:18px; color:#6E6E68; margin:0;\">{{ tagline }}<\u002Fp>\n    <\u002Fsection>\n\n    <!-- BACKGROUND -->\n    <section style=\"padding:64px 32px; border-top:2px solid #2F3E33;\">\n      <div style=\"text-align:center; margin-bottom:24px;\">\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; font-variant:small-caps; text-transform:uppercase; letter-spacing:0.15em; color:#6B8068; font-weight:500;\">Background<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"{{ bgRowStyle }}\">\n        <div style=\"{{ bgCol1Style }}\">\n          <span style=\"font-family:'Instrument Serif', serif; font-style:italic; font-size:24px; color:#2A2A28;\">Interior Design<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ bgCol2Style }}\">\n          <span style=\"font-family:'Instrument Serif', serif; font-style:italic; font-size:24px; color:#2A2A28;\">Pursuit Fellowship<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHAT I BRING -->\n    <section style=\"padding:64px 32px; border-top:2px solid #2F3E33;\">\n      <div style=\"text-align:center; margin-bottom:24px;\">\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; font-variant:small-caps; text-transform:uppercase; letter-spacing:0.15em; color:#6B8068; font-weight:500;\">What I Bring<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"{{ bringRowStyle }}\">\n        <sc-for list=\"{{ bringItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1; border:1px solid #2F3E33; padding:40px 24px; text-align:center; box-sizing:border-box;\">\n            <span style=\"font-family:'Instrument Serif', serif; font-style:italic; font-size:24px; color:#2A2A28;\">{{ item.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PROJECTS -->\n    <section style=\"padding:64px 32px; border-top:2px solid #2F3E33;\">\n      <div style=\"text-align:center; margin-bottom:24px;\">\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; font-variant:small-caps; text-transform:uppercase; letter-spacing:0.15em; color:#6B8068; font-weight:500;\">Projects<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #2F3E33;\">\n        <sc-for list=\"{{ projects }}\" as=\"project\" hint-placeholder-count=\"2\">\n          <div style=\"padding:32px; border-bottom:{{ project.borderBottom }};\">\n            <div style=\"font-family:'Instrument Serif', serif; font-style:italic; font-size:26px; color:#2F3E33; margin-bottom:8px;\">{{ project.title }}<\u002Fdiv>\n            <div style=\"font-family:'DM Sans', sans-serif; font-size:16px; color:#6E6E68; line-height:1.6;\">{{ project.description }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CONTACT -->\n    <section style=\"padding:64px 32px; border-top:2px solid #2F3E33; text-align:center;\">\n      <div style=\"margin-bottom:24px;\">\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; font-variant:small-caps; text-transform:uppercase; letter-spacing:0.15em; color:#6B8068; font-weight:500;\">Contact — Email — Social<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:32px;\">\n        <a href=\"mailto:hello@example.com\" style=\"font-family:'DM Sans', sans-serif; font-size:16px; color:#2A2A28; text-decoration:underline; text-decoration-color:#6B8068; text-underline-offset:4px;\">Email<\u002Fa>\n        <a href=\"https://linkedin.com\" style=\"font-family:'DM Sans', sans-serif; font-size:16px; color:#2A2A28; text-decoration:underline; text-decoration-color:#6B8068; text-underline-offset:4px;\">LinkedIn<\u002Fa>\n        <a href=\"https://github.com\" style=\"font-family:'DM Sans', sans-serif; font-size:16px; color:#2A2A28; text-decoration:underline; text-decoration-color:#6B8068; text-underline-offset:4px;\">GitHub<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    isMobile: typeof window !== 'undefined' ? window.innerWidth < 640 : false\n  };\n\n  componentDidMount() {\n    this._onResize = () => {\n      const isMobile = window.innerWidth < 640;\n      if (isMobile !== this.state.isMobile) this.setState({ isMobile });\n    };\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  renderVals() {\n    const isMobile = this.state.isMobile;\n\n    const bgRowStyle = {\n      display: 'flex',\n      flexDirection: isMobile ? 'column' : 'row',\n      border: '1px solid #2F3E33',\n      boxSizing: 'border-box'\n    };\n    const bgColBase = { flex: 1, padding: '32px 24px', textAlign: 'center', boxSizing: 'border-box' };\n    const bgCol1Style = Object.assign({}, bgColBase, isMobile\n      ? { borderBottom: '1px solid #2F3E33' }\n      : { borderRight: '1px solid #2F3E33' });\n    const bgCol2Style = Object.assign({}, bgColBase);\n\n    const bringRowStyle = {\n      display: 'flex',\n      flexDirection: isMobile ? 'column' : 'row',\n      gap: '16px'\n    };\n\n    const bringItems = [\n      { label: 'Purpose' },\n      { label: 'Design Sense' },\n      { label: 'Self Direction' }\n    ];\n\n    const rawProjects = [\n      {\n        title: 'Flashcards v2',\n        description: 'Upload a PDF, get spaced-repetition flashcards with a gamified level map that unlocks as you learn. Built with the Anthropic API.'\n      },\n      {\n        title: 'Mood Palette',\n        description: 'AI generated brand palettes, or extract one straight from a photo with built in accessibility contrast scoring.'\n      }\n    ];\n    const projects = rawProjects.map((p, i) => Object.assign({}, p, {\n      borderBottom: i === rawProjects.length - 1 ? 'none' : '1px solid #2F3E33'\n    }));\n\n    return {\n      name: 'Dominic Arlequin',\n      initials: 'DA',\n      tagline: 'I design with intention. I build with purpose.',\n      bgRowStyle,\n      bgCol1Style,\n      bgCol2Style,\n      bringRowStyle,\n      bringItems,\n      projects\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
