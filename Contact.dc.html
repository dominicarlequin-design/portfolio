<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#FFFFFF;}
    a{color:#1A1A18;}
    a:hover{color:#4A4A48;}
    @media (max-width: 640px) {
      .contact-main { padding: 48px 24px !important; }
      .contact-main h2 { font-size: 40px !important; }
      .contact-row { flex-direction: column !important; align-items: flex-start !important; gap: 8px !important; padding: 24px 8px !important; }
      .contact-row .contact-value { font-size: 18px !important; }
      .site-footer { padding: 24px !important; flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
    }
  </style>
</helmet>

<dc-import name="Nav" current="contact" hint-size="100%,81px"></dc-import>

<div style="fontFamily:'DM Sans',sans-serif;background:#FFFFFF;minHeight:calc(100vh - 81px);display:flex;flexDirection:column;">

  <section ref="{{ mainRef }}" class="contact-main" style="{{ mainStyle }}flex:1;padding:96px 48px;maxWidth:900px;margin:0 auto;width:100%;boxSizing:border-box;">
    <div style="fontFamily:'DM Sans',sans-serif;fontSize:13px;letterSpacing:1.5px;textTransform:uppercase;color:#4A4A48;marginBottom:24px;">Contact</div>
    <h2 style="fontFamily:'Instrument Serif',serif;fontStyle:italic;fontWeight:400;fontSize:56px;color:#1A1A18;margin:0 0 16px 0;">Let's talk.</h2>
    <p style="fontFamily:'DM Sans',sans-serif;fontSize:17px;lineHeight:1.6;color:#4A4A48;margin:0 0 64px 0;maxWidth:520px;">Reach out, I'd love to hear from you.</p>

    <div style="borderTop:1px solid #1A1A18;">
      <a href="mailto:dominic.arlequin@pursuit.org" style="display:flex;justifyContent:space-between;alignItems:center;padding:32px 8px;borderBottom:1px solid #1A1A18;textDecoration:none;color:#1A1A18;" class="contact-row" style-hover="background:#F5F5F4;">
        <span style="fontFamily:'DM Sans',sans-serif;fontSize:14px;letterSpacing:1px;textTransform:uppercase;color:#4A4A48;">Email</span>
        <span style="fontFamily:'Instrument Serif',serif;fontSize:26px;color:#1A1A18;" class="contact-value">dominic.arlequin@pursuit.org →</span>
      </a>
      <a href="https://github.com/dominicarlequin-design" target="_blank" style="display:flex;justifyContent:space-between;alignItems:center;padding:32px 8px;borderBottom:1px solid #1A1A18;textDecoration:none;color:#1A1A18;" class="contact-row" style-hover="background:#F5F5F4;">
        <span style="fontFamily:'DM Sans',sans-serif;fontSize:14px;letterSpacing:1px;textTransform:uppercase;color:#4A4A48;">GitHub</span>
        <span style="fontFamily:'Instrument Serif',serif;fontSize:26px;color:#1A1A18;" class="contact-value">github.com/dominicarlequin-design →</span>
      </a>
      <a href="https://www.linkedin.com/in/dominic-arlequin-200407419/" target="_blank" style="display:flex;justifyContent:space-between;alignItems:center;padding:32px 8px;borderBottom:1px solid #1A1A18;textDecoration:none;color:#1A1A18;" class="contact-row" style-hover="background:#F5F5F4;">
        <span style="fontFamily:'DM Sans',sans-serif;fontSize:14px;letterSpacing:1px;textTransform:uppercase;color:#4A4A48;">LinkedIn</span>
        <span style="fontFamily:'Instrument Serif',serif;fontSize:26px;color:#1A1A18;" class="contact-value">linkedin.com/in/dominic-arlequin →</span>
      </a>
    </div>
  </section>

  <footer class="site-footer" style="borderTop:1px solid #1A1A18;padding:32px 48px;display:flex;justifyContent:space-between;alignItems:center;flexWrap:wrap;gap:16px;fontFamily:'DM Sans',sans-serif;fontSize:13px;color:#4A4A48;">
    <span>© 2026 Dominic Arlequin</span>
    <div style="display:flex;gap:24px;">
      <a href="mailto:dominic.arlequin@pursuit.org" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">Email</a>
      <a href="https://github.com/dominicarlequin-design" target="_blank" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">GitHub</a>
      <a href="https://www.linkedin.com/in/dominic-arlequin-200407419/" target="_blank" style="color:#4A4A48;textDecoration:none;" style-hover="color:#1A1A18;">LinkedIn</a>
    </div>
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { revealed: {} };
  refsMap = {};

  componentDidMount() {
    this.io = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting) {
          const id = en.target.getAttribute('data-reveal-id');
          this.setState((s) => ({ revealed: { ...s.revealed, [id]: true } }));
          this.io.unobserve(en.target);
        }
      });
    }, { threshold: 0.1 });
    Object.keys(this.refsMap).forEach((k) => {
      if (this.refsMap[k]) this.io.observe(this.refsMap[k]);
    });
  }

  componentWillUnmount() {
    if (this.io) this.io.disconnect();
  }

  setRef(id) {
    return (el) => {
      if (el && !this.refsMap[id]) {
        el.setAttribute('data-reveal-id', id);
        this.refsMap[id] = el;
        if (this.io) this.io.observe(el);
      }
    };
  }

  styleFor(id) {
    const on = !!this.state.revealed[id];
    return {
      opacity: on ? 1 : 0,
      transform: on ? 'translateY(0)' : 'translateY(20px)',
      transition: 'opacity 0.8s ease, transform 0.8s ease',
    };
  }

  toCss(styleObj) {
    return Object.entries(styleObj).map(([k, v]) => {
      const kebab = k.replace(/[A-Z]/g, (m) => '-' + m.toLowerCase());
      return kebab + ':' + v;
    }).join(';') + ';';
  }

  renderVals() {
    return {
      mainRef: this.setRef('main'),
      mainStyle: this.toCss(this.styleFor('main')),
    };
  }
}
</script>
</body>
</html>
